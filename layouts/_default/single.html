{{ define "main" }}
{{ partial "header.html" . }}

<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-meta">{{ .Date.Format "2 January 2006" }}</p>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ if .Params.tags }}
  <div class="post-tags">
    {{ range .Params.tags }}
    <a href="{{ "/tags/" | relURL }}{{ . | urlize }}/">{{ . }}</a>
    {{ end }}
  </div>
  {{ end }}
</article>

{{ partial "footer.html" . }}
{{ end }}
